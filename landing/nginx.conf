server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://auth.fookiecloud.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    gzip on;
    gzip_types text/css application/javascript text/plain image/svg+xml;

    location = /callback {
        try_files /callback.html =404;
    }

    location = /profile {
        try_files /profile.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
    }
}
