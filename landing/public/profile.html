<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile — Fookie Cloud</title>
  <meta name="color-scheme" content="dark" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-page="profile">
  <div class="shell">
    <header class="top" id="top">
      <div class="top-inner">
        <a class="mark" href="/">Fookie<span>Cloud</span></a>
        <div class="top-right" id="auth-slot"></div>
      </div>
    </header>

    <main class="page">
      <div class="page-inner page-narrow">
        <div class="page-head">
          <h1>Profile</h1>
          <p>Account and API keys for Lotaru, Task Bridge, and MCP.</p>
        </div>

        <div class="profile-card" id="profile-card"></div>

        <section class="panel" id="keys-panel">
          <div class="panel-head">
            <div>
              <h2>API keys</h2>
              <p>Long-lived Bearer tokens for agents and integrations.</p>
            </div>
            <button class="btn-solid" type="button" id="create-key">Create key</button>
          </div>
          <ul class="keys-list" id="keys-list"></ul>
        </section>
      </div>
    </main>
  </div>

  <div class="sheet" id="signin-sheet" hidden>
    <button class="sheet-backdrop" type="button" data-close-signin aria-label="Close"></button>
    <div class="sheet-card" role="dialog" aria-modal="true" aria-labelledby="signin-title">
      <button class="sheet-x" type="button" data-close-signin aria-label="Close">×</button>
      <h2 id="signin-title">Sign in</h2>
      <p class="sheet-copy">Continue with Google to open your profile.</p>
      <a class="google-btn" id="google-login" href="#">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34 5.4 29.3 3.5 24 3.5 12.4 3.5 3 12.9 3 24.5S12.4 45.5 24 45.5 45 36.1 45 24.5c0-1.4-.1-2.7-.4-4z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12.5 24 12.5c3 0 5.8 1.1 7.9 3l5.7-5.7C34 5.4 29.3 3.5 24 3.5 16.1 3.5 9.3 7.9 6.3 14.7z"/>
          <path fill="#4CAF50" d="M24 45.5c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 36.9 26.7 38 24 38c-5.2 0-9.6-3.3-11.2-7.9l-6.5 5C9.2 41.2 16 45.5 24 45.5z"/>
          <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.5l.0.0 6.2 5.2C39.2 36.9 45 32 45 24.5c0-1.4-.1-2.7-.4-4z"/>
        </svg>
        Continue with Google
      </a>
    </div>
  </div>

  <div class="sheet" id="key-sheet" hidden>
    <button class="sheet-backdrop" type="button" data-close-key aria-label="Close"></button>
    <div class="sheet-card" role="dialog" aria-modal="true" aria-labelledby="key-title">
      <button class="sheet-x" type="button" data-close-key aria-label="Close">×</button>
      <h2 id="key-title">New API key</h2>
      <div id="key-form">
        <label class="field">
          <span>Name</span>
          <input id="key-name" type="text" placeholder="Cursor MCP" maxlength="80" />
        </label>
        <button class="btn-solid" type="button" id="key-submit" style="width:100%;margin-top:1rem">Create</button>
      </div>
      <div id="key-reveal" hidden>
        <p class="sheet-copy">Copy this key now. It won’t be shown again.</p>
        <div class="key-box">
          <code id="key-value"></code>
          <button class="btn-outline" type="button" id="key-copy">Copy</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/main.js"></script>
</body>
</html>
