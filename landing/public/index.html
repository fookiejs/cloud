<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fookie Cloud</title>
  <meta name="description" content="Fookie Cloud" />
  <meta name="color-scheme" content="dark" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;600;700&family=Syne:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="shell">
    <header class="top" id="top">
      <a class="logo" href="/">Fookie<span>Cloud</span></a>
      <div class="top-right" id="auth-slot">
        <button class="btn-solid" type="button" data-signin>Sign in</button>
      </div>
    </header>

    <main class="page">
      <div class="page-head">
        <p class="page-kicker">Apps</p>
        <h1>Your workspace</h1>
        <p>Open an app with the same Fookie account.</p>
      </div>
      <section class="apps" id="apps">
        <button class="app" type="button" data-app="lotaru">
          <strong>Lotaru</strong>
          <span>Local task runner</span>
        </button>
        <button class="app" type="button" data-app="task-bridge">
          <strong>Task Bridge</strong>
          <span>Epic / task board</span>
        </button>
      </section>
    </main>

    <footer class="foot">Fookie Cloud</footer>
  </div>

  <script src="/main.js"></script>
</body>
</html>
