<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fookie Cloud</title>
  <meta name="description" content="Fookie Cloud" />
  <meta name="color-scheme" content="dark" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="shell">
    <header class="top" id="top">
      <a class="mark" href="/">Fookie<span>Cloud</span></a>
      <div class="top-right" id="auth-slot">
        <button class="btn-ghost" type="button" data-signin>Sign in</button>
      </div>
    </header>

    <main class="page">
      <div class="page-head">
        <h1>Apps</h1>
        <p>Open Lotaru or Task Bridge with the same account.</p>
      </div>
      <section class="apps" id="apps" aria-label="Applications">
        <button class="app" type="button" data-app="lotaru">
          <span class="app-mark" aria-hidden="true">L</span>
          <span class="app-text">
            <strong>Lotaru</strong>
            <span>Local Task Runner</span>
          </span>
          <span class="app-go" aria-hidden="true">Open</span>
        </button>
        <button class="app" type="button" data-app="task-bridge">
          <span class="app-mark app-mark-tb" aria-hidden="true">T</span>
          <span class="app-text">
            <strong>Task Bridge</strong>
            <span>Epics and task board</span>
          </span>
          <span class="app-go" aria-hidden="true">Open</span>
        </button>
      </section>
    </main>
  </div>

  <script src="/main.js"></script>
</body>
</html>
