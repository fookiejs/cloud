<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Signing in — Fookie Cloud</title>
  <meta name="color-scheme" content="dark" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Syne:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="callback-wrap">
    <div>
      <p class="page-kicker">Fookie Cloud</p>
      <h1 id="status">Signing you in…</h1>
      <p id="detail">One moment.</p>
    </div>
  </main>
  <script>
    (async () => {
      const AUTH = "https://auth.fookiecloud.com";
      const params = new URLSearchParams(location.search);
      const code = params.get("code");
      const err = params.get("error");
      const status = document.getElementById("status");
      const detail = document.getElementById("detail");

      if (err) {
        status.textContent = "Sign-in stopped";
        detail.textContent = err;
        return;
      }
      if (!code) {
        location.replace("/");
        return;
      }

      try {
        const res = await fetch(`${AUTH}/v1/token`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            grant_type: "authorization_code",
            code,
            client_id: "web",
            redirect_uri: "https://fookiecloud.com/callback",
          }),
        });
        const data = await res.json();
        if (!res.ok) {
          status.textContent = "Couldn’t finish sign-in";
          detail.textContent = data.error_description || data.error || "Try again.";
          return;
        }

        localStorage.setItem("fookie_access_token", data.access_token);
        if (data.refresh_token) {
          localStorage.setItem("fookie_refresh_token", data.refresh_token);
        }

        const me = await fetch(`${AUTH}/v1/userinfo`, {
          headers: { Authorization: `Bearer ${data.access_token}` },
        });
        if (me.ok) {
          localStorage.setItem("fookie_user", JSON.stringify(await me.json()));
        }

        const next = sessionStorage.getItem("fookie_after_login") || "/";
        sessionStorage.removeItem("fookie_after_login");
        location.replace(next);
      } catch (e) {
        status.textContent = "Auth unreachable";
        detail.textContent = String(e);
      }
    })();
  </script>
</body>
</html>
