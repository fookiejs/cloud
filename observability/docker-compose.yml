services:
  prometheus:
    image: prom/prometheus:v3.4.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    volumes:
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
      - observability

  loki:
    image: grafana/loki:3.5.0
    command:
      - -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
    restart: unless-stopped
    networks:
      - observability

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    configs:
      - source: otel_config
        target: /etc/otelcol-contrib/config.yaml
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - observability

  grafana:
    image: grafana/grafana:12.0.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: Admin
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://grafana.fookiecloud.com}
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_BASIC_ENABLED: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER_NAME: X-Auth-Request-Email
      GF_AUTH_PROXY_HEADER_PROPERTY: email
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
      GF_AUTH_PROXY_HEADERS: "Name:X-Auth-Request-User Email:X-Auth-Request-Email"
      GF_AUTH_PROXY_ENABLE_LOGIN_TOKEN: "true"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana-data:/var/lib/grafana
    configs:
      - source: grafana_datasources
        target: /etc/grafana/provisioning/datasources/datasources.yml
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - observability

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.8.1
    environment:
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: https://auth.fookiecloud.com
      OAUTH2_PROXY_CLIENT_ID: grafana
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_REDIRECT_URL: https://grafana.fookiecloud.com/oauth2/callback
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_COOKIE_DOMAINS: grafana.fookiecloud.com
      OAUTH2_PROXY_WHITELIST_DOMAINS: .fookiecloud.com
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_AUTHENTICATED_EMAILS_FILE: /etc/oauth2-proxy/authenticated-emails.txt
      OAUTH2_PROXY_UPSTREAMS: http://grafana:3000/
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "false"
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_CODE_CHALLENGE_METHOD: S256
      OAUTH2_PROXY_SCOPE: openid email profile
      OAUTH2_PROXY_OIDC_EMAIL_CLAIM: email
      OAUTH2_PROXY_USER_ID_CLAIM: email
      OAUTH2_PROXY_INSECURE_OIDC_SKIP_NONCE: "true"
    configs:
      - source: oauth2_emails
        target: /etc/oauth2-proxy/authenticated-emails.txt
    depends_on:
      - grafana
    restart: unless-stopped
    networks:
      - observability

networks:
  observability:
    driver: bridge

volumes:
  prometheus-data:
  loki-data:
  grafana-data:

configs:
  oauth2_emails:
    content: |
      seyitumutbicer@gmail.com

  prometheus_config:
    content: |
      global:
        scrape_interval: 15s
        evaluation_interval: 15s
      scrape_configs:
        - job_name: prometheus
          static_configs:
            - targets: ["localhost:9090"]
        - job_name: otel-collector
          static_configs:
            - targets: ["otel-collector:8888"]

  otel_config:
    content: |
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
      processors:
        batch:
          timeout: 5s
          send_batch_size: 1024
        memory_limiter:
          check_interval: 2s
          limit_mib: 512
      exporters:
        prometheus:
          endpoint: 0.0.0.0:8889
          namespace: fookie
        prometheusremotewrite:
          endpoint: http://prometheus:9090/api/v1/write
          tls:
            insecure: true
        loki:
          endpoint: http://loki:3100/loki/api/v1/push
          default_labels_enabled:
            exporter: true
            job: true
        debug:
          verbosity: basic
      service:
        pipelines:
          metrics:
            receivers: [otlp]
            processors: [memory_limiter, batch]
            exporters: [prometheusremotewrite, prometheus]
          logs:
            receivers: [otlp]
            processors: [memory_limiter, batch]
            exporters: [loki]
          traces:
            receivers: [otlp]
            processors: [memory_limiter, batch]
            exporters: [debug]
        telemetry:
          metrics:
            address: 0.0.0.0:8888

  grafana_datasources:
    content: |
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://prometheus:9090
          isDefault: true
          editable: false
        - name: Loki
          type: loki
          access: proxy
          url: http://loki:3100
          editable: false
