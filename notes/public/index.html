<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notes — Fookie Cloud</title>
  <meta name="color-scheme" content="light" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="rail">
      <div class="brand">Notes</div>
      <p class="rail-copy">Günün brifingi. Kısa, düz metin.</p>
      <div class="rail-actions">
        <button type="button" id="btn-refresh">Yenile</button>
        <button type="button" id="btn-logout" hidden>Çıkış</button>
      </div>
      <div class="rail-auth" id="auth-box">
        <label for="token-input">Fookie API key</label>
        <input id="token-input" type="password" autocomplete="off" placeholder="tb_live_… / fookie key" />
        <button type="button" id="btn-save-token">Kaydet</button>
      </div>
    </aside>
    <main class="main">
      <header class="list-head">
        <h1>Gelen</h1>
        <span id="unread-count" class="badge" hidden>0</span>
      </header>
      <ul id="note-list" class="note-list"></ul>
      <section id="empty" class="empty" hidden>Henüz not yok.</section>
      <section id="detail" class="detail" hidden>
        <div class="detail-bar">
          <button type="button" id="btn-back">Liste</button>
          <button type="button" id="btn-seen">Görüldü</button>
        </div>
        <h2 id="detail-title"></h2>
        <div class="meta" id="detail-meta"></div>
        <pre id="detail-body" class="body"></pre>
      </section>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
