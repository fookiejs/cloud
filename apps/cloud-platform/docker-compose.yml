services:
  fookie-cloud:
    container_name: fookie-cloud
    build:
      context: ../..
      dockerfile: apps/cloud-platform/Dockerfile
    ports:
      - "8088:8080"
    networks:
      - default
      - fookie-obs
    environment:
      # Shared secret Prometheus sends as a Bearer token to GET /metrics — must match
      # the contents of observability/metrics_token on the same host.
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      NODE_ENV: development
      PORT: "8080"
      DATA_DIR: /data
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8088}
      FOOKIE_AUTH_ISSUER: ${FOOKIE_AUTH_ISSUER:-https://auth.fookiecloud.com}
      EMBEDDED_AUTH_BINARY: ""
      FOOKIE_AUTH_CLIENT_ID: ${FOOKIE_AUTH_CLIENT_ID:-fookie}
      SCRIPT_CLIENT_ID: ${SCRIPT_CLIENT_ID:-script}
      FOOKIE_ADMIN_EMAILS: ${FOOKIE_ADMIN_EMAILS:-}
      FOOKIE_LOCAL_AUTH_EMAIL: ${FOOKIE_LOCAL_AUTH_EMAIL:-local@fookiecloud.test}
      SCRIPT_WORKSPACES_HOST_DIR: ${SCRIPT_WORKSPACES_HOST_DIR:-}
      SCRIPT_SANDBOX_IMAGE: ${SCRIPT_SANDBOX_IMAGE:-node:22-bookworm}
      SCRIPT_MEMORY_LIMIT_MB: ${SCRIPT_MEMORY_LIMIT_MB:-1024}
      SCRIPT_CPU_LIMIT: ${SCRIPT_CPU_LIMIT:-1}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      CODE_SERVER_IMAGE: ${CODE_SERVER_IMAGE:-codercom/code-server:latest}
      # Leave unset to disable the browser-IDE feature entirely. When set, requires a
      # wildcard DNS record (and TLS cert) for "*.<this value>" pointing at this host.
      CODE_SERVER_DOMAIN: ${CODE_SERVER_DOMAIN:-}
      DEPLOY_IMAGE: ${DEPLOY_IMAGE:-node:22-bookworm}
      DEPLOY_MEMORY_LIMIT_MB: ${DEPLOY_MEMORY_LIMIT_MB:-512}
      DEPLOY_CPU_LIMIT: ${DEPLOY_CPU_LIMIT:-1}
      # Leave unset to disable Deploy. Needs its OWN wildcard DNS record — deployed
      # apps are public, unlike the private code-server IDE, so they must not share
      # CODE_SERVER_DOMAIN's routing.
      DEPLOY_DOMAIN: ${DEPLOY_DOMAIN:-}
    volumes:
      - fookie-cloud-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  default: {}
  fookie-obs:
    external: true

volumes:
  fookie-cloud-data:
